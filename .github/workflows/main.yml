name: Build

on:
  push:
    paths-ignore:
      - 'docs/**'
      - 'README.md'
  workflow_call:

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows/amd64
            artifact: ddev-gui-windows-amd64.exe
          - os: ubuntu-24.04
            platform: linux/amd64
            artifact: ddev-gui-linux-amd64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # Linux dependencies for Wails (WebKit2GTK + pkg-config)
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev pkg-config

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run backend tests
        run: go test -v ./backend/...

      - name: Run frontend tests
        working-directory: frontend
        run: npm test

      - name: Build
        shell: pwsh
        run: |
          $gitVersion = (git describe --tags --always --dirty 2>$null)
          if (-not $gitVersion) {
            $gitVersion = 'dev'
          }

          $gitCommit = (git rev-parse --short HEAD 2>$null)
          if (-not $gitCommit) {
            $gitCommit = 'unknown'
          }

          $semverMatch = [regex]::Match($gitVersion, '^v?(\d+\.\d+\.\d+)')
          $semver = if ($semverMatch.Success) {
            "$($semverMatch.Groups[1].Value).0"
          } else {
            '0.0.0.0'
          }

          (Get-Content wails.json -Raw) -replace '"productVersion":\s*"[^"]*"', ('"productVersion": "' + $semver + '"') | Set-Content wails.json

          $ldflags = "-X ddev-gui/backend.AppVersionStr=$gitVersion -X ddev-gui/backend.CommitHashStr=$gitCommit"
          Write-Host "Building $gitVersion ($gitCommit)"
          wails build -platform "${{ matrix.platform }}" -o "${{ matrix.artifact }}" -ldflags "$ldflags" -skipbindings

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: build/bin/${{ matrix.artifact }}

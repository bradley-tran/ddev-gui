stages:
  - build
  - upload
  - release

# ---------------------------------------------------------------------------
# Build jobs
# ---------------------------------------------------------------------------

build:windows:
  stage: build
  image: golang:1.22-bookworm
  tags:
    - linux
  variables:
    PLATFORM: windows/amd64
    ARTIFACT: ddev-gui-windows-amd64.exe
    GOPATH: ${CI_PROJECT_DIR}/.cache/go
    GOCACHE: ${CI_PROJECT_DIR}/.cache/go-build
  cache:
    - key: windows-go-${CI_COMMIT_REF_SLUG}
      paths:
        - .cache/go/pkg/mod/
        - .cache/go-build/
    - key: windows-npm-${CI_COMMIT_REF_SLUG}
      paths:
        - frontend/node_modules/
  before_script:
    # Install system dependencies (Node.js + MinGW-w64 cross-compiler)
    - curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
    - apt-get update && apt-get install -y nodejs gcc-mingw-w64-x86-64 g++-mingw-w64-x86-64
    - go install github.com/wailsapp/wails/v2/cmd/wails@latest
    - export PATH="${GOPATH}/bin:${PATH}"
    - cd frontend && npm ci && cd ..
  script:
    - cd frontend && npm test && cd ..
    - |
      GIT_VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "dev")
      GIT_COMMIT=$(git rev-parse --short HEAD 2>/dev/null || echo "unknown")
      # Update Windows file version in wails.json (e.g. v1.2.3 -> 1.2.3.0)
      SEMVER=$(echo "$GIT_VERSION" | sed -n 's/^v\?\([0-9]\+\.[0-9]\+\.[0-9]\+\).*/\1.0/p')
      [ -z "$SEMVER" ] && SEMVER="0.0.0.0"
      sed -i "s/\"productVersion\": \"[^\"]*\"/\"productVersion\": \"${SEMVER}\"/" wails.json
      LDFLAGS="-X ddev-gui/backend.AppVersionStr=${GIT_VERSION} -X ddev-gui/backend.CommitHashStr=${GIT_COMMIT}"
      # Cross-compile for Windows using MinGW-w64 (scoped to this command only)
      env CGO_ENABLED=1 CC=x86_64-w64-mingw32-gcc-posix CXX=x86_64-w64-mingw32-g++-posix \
        wails build -platform $PLATFORM -o $ARTIFACT -ldflags "$LDFLAGS" -skipbindings
  artifacts:
    paths:
      - build/bin/ddev-gui-windows-amd64.exe
    expire_in: 7 days

build:linux:
  stage: build
  image: golang:1.22-bookworm
  tags:
    - linux
  variables:
    PLATFORM: linux/amd64
    ARTIFACT: ddev-gui-linux-amd64
    GOPATH: ${CI_PROJECT_DIR}/.cache/go
    GOCACHE: ${CI_PROJECT_DIR}/.cache/go-build
  cache:
    - key: linux-go-${CI_COMMIT_REF_SLUG}
      paths:
        - .cache/go/pkg/mod/
        - .cache/go-build/
    - key: linux-npm-${CI_COMMIT_REF_SLUG}
      paths:
        - frontend/node_modules/
  before_script:
    # Install system dependencies (Node.js + WebKit2GTK)
    - curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
    - apt-get update && apt-get install -y nodejs libgtk-3-dev libwebkit2gtk-4.0-dev pkg-config
    - go install github.com/wailsapp/wails/v2/cmd/wails@latest
    - export PATH="${GOPATH}/bin:${PATH}"
    - cd frontend && npm ci && cd ..
  script:
    - cd frontend && npm test && cd ..
    - |
      GIT_VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "dev")
      GIT_COMMIT=$(git rev-parse --short HEAD 2>/dev/null || echo "unknown")
      # Update Windows file version in wails.json (e.g. v1.2.3 -> 1.2.3.0)
      SEMVER=$(echo "$GIT_VERSION" | sed -n 's/^v\?\([0-9]\+\.[0-9]\+\.[0-9]\+\).*/\1.0/p')
      [ -z "$SEMVER" ] && SEMVER="0.0.0.0"
      sed -i "s/\"productVersion\": \"[^\"]*\"/\"productVersion\": \"${SEMVER}\"/" wails.json
      LDFLAGS="-X ddev-gui/backend.AppVersionStr=${GIT_VERSION} -X ddev-gui/backend.CommitHashStr=${GIT_COMMIT}"
      wails build -platform $PLATFORM -o $ARTIFACT -ldflags "$LDFLAGS" -skipbindings
  artifacts:
    paths:
      - build/bin/ddev-gui-linux-amd64
    expire_in: 7 days

# ---------------------------------------------------------------------------
# Upload to Generic Package Registry (only on version tags)
# ---------------------------------------------------------------------------

upload:
  stage: upload
  image: curlimages/curl:latest
  tags:
    - linux
  rules:
    - if: $CI_COMMIT_TAG =~ /^v.*/
  needs:
    - job: build:windows
      artifacts: true
    - job: build:linux
      artifacts: true
  script:
    - |
      curl --header "JOB-TOKEN: $CI_JOB_TOKEN" \
           --upload-file build/bin/ddev-gui-windows-amd64.exe \
           "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/ddev-gui/${CI_COMMIT_TAG}/ddev-gui-windows-amd64.exe"
    - |
      curl --header "JOB-TOKEN: $CI_JOB_TOKEN" \
           --upload-file build/bin/ddev-gui-linux-amd64 \
           "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/ddev-gui/${CI_COMMIT_TAG}/ddev-gui-linux-amd64"

# ---------------------------------------------------------------------------
# Release (only on version tags)
# ---------------------------------------------------------------------------

release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  tags:
    - linux
  rules:
    - if: $CI_COMMIT_TAG =~ /^v.*/
  needs:
    - job: upload
  script:
    - echo "Creating release for $CI_COMMIT_TAG"
  release:
    tag_name: $CI_COMMIT_TAG
    name: "Release $CI_COMMIT_TAG"
    description: "Automated release for $CI_COMMIT_TAG"
    assets:
      links:
        - name: ddev-gui-windows-amd64.exe
          url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/ddev-gui/${CI_COMMIT_TAG}/ddev-gui-windows-amd64.exe"
        - name: ddev-gui-linux-amd64
          url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/ddev-gui/${CI_COMMIT_TAG}/ddev-gui-linux-amd64"
